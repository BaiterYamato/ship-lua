    {"name": "operation_error", "kind": "object", "fields": [
      {"name": "code", "type": "string", "required": true},
      {"name": "message", "type": "string", "required": true}
    ], "description": "Erro estruturado retornado sem lançar lua_error."},
    {"name": "actor_snapshot", "kind": "object", "fields": [
      {"name": "handle", "type": "actor_handle", "required": true},
      {"name": "actor_id", "type": "integer", "required": true},
      {"name": "category", "type": "integer", "required": true}
    ], "description": "Snapshot mínimo e estável de ator."},
    {"name": "hotkey_options", "kind": "object", "fields": [
