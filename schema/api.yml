    {"name": "event_options", "kind": "object", "fields": [
      {"name": "priority", "type": "integer", "required": false}
    ], "description": "Opções determinísticas de inscrição."},
    {"name": "actor_handle", "kind": "object", "fields": [
      {"name": "kind", "type": "string", "required": true},
      {"name": "slot", "type": "integer", "required": true},
      {"name": "generation", "type": "integer", "required": true},
      {"name": "scene_generation", "type": "integer", "required": true}
    ], "description": "Handle opaco validado por kind, slot, geração e cena."},
    {"name": "actor_position", "kind": "object", "fields": [
