name: core-windows

# CI do núcleo compartilhado ShipLua em Windows/MSVC (critério v0.1.0, PLAN Fase 10).
# O gerador "Visual Studio 17 2022" não localiza o VS no runner atual; usamos o
# ambiente MSVC (msvc-dev-cmd) + Ninja, que encontra `cl` no PATH — padrão estável.
# O núcleo já compilou sob MSVC 19.44 na integração dos forks (OOT-001).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: build + ctest (windows / msvc)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Versions
        run: |
          cmake --version
          cl
          python --version

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120
